<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CS2KZ Maplist Builder</title>
<meta
  name="description"
  content="Build mapname:workshopid maplists for mm-cs2rockthevote and mm-cs2admin. Filter CS2KZ maps by gamemode, TP/PRO tier, ranked and global state."
/>
<meta name="theme-color" content="#4fa3ff" />

<!-- Open Graph (Discord, Facebook, etc.) -->
<meta property="og:type" content="website" />
<meta property="og:title" content="CS2KZ Maplist Builder" />
<meta property="og:description" content="Build mapname:workshopid maplists." />
<meta property="og:site_name" content="CS2KZ Maplist Builder" />

<!-- Twitter / X -->
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="CS2KZ Maplist Builder" />
<meta name="twitter:description" content="Build mapname:workshopid maplists." />
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #9aa3af;
    --accent: #4fa3ff;
    --accent-dim: #2b3a52;
    --good: #4fd18b;
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font:
      15px/1.5 system-ui,
      -apple-system,
      Segoe UI,
      Roboto,
      sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
  }
  header p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  header a {
    color: var(--accent);
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
  }
  @media (max-width: 800px) {
    main {
      grid-template-columns: 1fr;
    }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .field {
    margin-bottom: 18px;
  }
  .field > label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .seg {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 7px 14px;
    cursor: pointer;
    font: inherit;
    font-size: 14px;
  }
  .seg button.on {
    background: var(--accent);
    color: #071018;
    font-weight: 600;
  }
  .tiers {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .tier {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
  }
  .tier:hover {
    background: var(--panel-2);
  }
  .tier input {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .tier .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex: none;
  }
  .tier .cnt {
    margin-left: auto;
    color: var(--muted);
    font-size: 12px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 0;
    cursor: pointer;
  }
  .toggle-row input {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .linkish {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font: inherit;
    font-size: 12px;
    padding: 0;
  }
  .out-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .out-head h2 {
    margin: 0;
    flex: 1;
  }
  .count {
    color: var(--good);
    font-weight: 600;
    font-size: 14px;
  }
  button.act {
    background: var(--accent-dim);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 13px;
    border-radius: 7px;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
  }
  button.act:hover {
    border-color: var(--accent);
  }
  #output {
    display: flex;
    flex-direction: column;
  }
  textarea {
    width: 100%;
    flex: 1;
    min-height: 420px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px;
    font:
      13px/1.5 ui-monospace,
      SFMono-Regular,
      Consolas,
      monospace;
    resize: none;
    overflow: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  textarea::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  textarea::-webkit-scrollbar-track {
    background: transparent;
  }
  textarea::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 6px;
    border: 2px solid var(--panel-2);
  }
  textarea::-webkit-scrollbar-thumb:hover {
    background: var(--accent-dim);
  }
  .status {
    color: var(--muted);
    font-size: 13px;
    margin-top: 10px;
  }
  .search {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 8px 10px;
    font: inherit;
    font-size: 14px;
  }
</style>

<header>
  <h1>CS2KZ Maplist Builder</h1>
</header>

<main>
  <section class="panel" id="controls">
    <h2>Filters</h2>

    <div class="field">
      <label>Gamemode</label>
      <div class="seg" id="mode">
        <button data-v="vanilla" class="on">Vanilla</button>
        <button data-v="classic">Classic</button>
      </div>
    </div>

    <div class="field">
      <label>Tier basis</label>
      <div class="seg" id="basis">
        <button data-v="nub_tier" class="on">TP</button>
        <button data-v="pro_tier">PRO</button>
      </div>
    </div>

    <div class="field">
      <label
        >Tiers <button class="linkish" id="tierAll">all</button> /
        <button class="linkish" id="tierNone">none</button>
      </label>
      <div class="tiers" id="tiers"></div>
    </div>

    <div class="field">
      <label class="toggle-row">
        <input type="checkbox" id="onlyRanked" checked />
        Only maps with Ranked filters
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="onlyGlobal" checked />
        Only Global (approved) maps
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="tierTag" />
        Append per-course tiers, e.g. <code>kz_x&nbsp;(T3/2/5)</code>
      </label>
    </div>

    <div class="field" style="margin-bottom: 0">
      <label>Search name</label>
      <input class="search" id="search" placeholder="kz_..." />
    </div>
  </section>

  <section class="panel" id="output">
    <div class="out-head">
      <h2>Maplist</h2>
      <span class="count" id="count">0 maps</span>
      <button class="act" id="sort">Sort A -> Z</button>
      <button class="act" id="copy">Copy</button>
      <button class="act" id="download">Download .txt</button>
    </div>
    <textarea id="out" spellcheck="false"></textarea>
    <div class="status" id="status">Loading maps…</div>
  </section>
</main>

<script>
  const API = "https://api.cs2kz.org/maps?limit=500";
  // Tier order: easiest to hardest. Colors roughly track difficulty.
  const TIERS = [
    ["very-easy", "#4fd18b"],
    ["easy", "#8bd14f"],
    ["medium", "#d1cf4f"],
    ["advanced", "#d1a24f"],
    ["hard", "#d1774f"],
    ["very-hard", "#d14f4f"],
    ["extreme", "#d14f9e"],
    ["death", "#a24fd1"],
    ["unfeasible", "#6f4fd1"],
    ["impossible", "#4f6fd1"],
  ];

  const state = {
    mode: "vanilla",
    basis: "nub_tier",
    tiers: new Set(TIERS.map((t) => t[0])),
    onlyRanked: true,
    onlyGlobal: true,
    tierTag: false,
    search: "",
  };
  const TIER_NUM = Object.fromEntries(TIERS.map(([t], i) => [t, i + 1]));
  let maps = [];

  const $ = (s) => document.querySelector(s);

  // Build tier checkboxes
  const tiersEl = $("#tiers");
  for (const [t, color] of TIERS) {
    const row = document.createElement("label");
    row.className = "tier";
    row.innerHTML =
      `<input type="checkbox" data-t="${t}" checked>` +
      `<span class="dot" style="background:${color}"></span>` +
      `<span>${label(t)}</span><span class="cnt" data-cnt="${t}"></span>`;
    tiersEl.appendChild(row);
  }
  function label(t) {
    return t.replace(/-/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
  }

  // Segmented controls
  function seg(id, key) {
    $(id).addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b) return;
      $(id)
        .querySelectorAll("button")
        .forEach((x) => x.classList.toggle("on", x === b));
      state[key] = b.dataset.v;
      render();
    });
  }
  seg("#mode", "mode");
  seg("#basis", "basis");

  tiersEl.addEventListener("change", (e) => {
    const t = e.target.dataset.t;
    if (!t) return;
    e.target.checked ? state.tiers.add(t) : state.tiers.delete(t);
    render();
  });
  $("#tierAll").onclick = () => setAllTiers(true);
  $("#tierNone").onclick = () => setAllTiers(false);
  function setAllTiers(on) {
    state.tiers = on ? new Set(TIERS.map((t) => t[0])) : new Set();
    tiersEl.querySelectorAll("input").forEach((i) => (i.checked = on));
    render();
  }

  $("#onlyRanked").onchange = (e) => {
    state.onlyRanked = e.target.checked;
    render();
  };
  $("#onlyGlobal").onchange = (e) => {
    state.onlyGlobal = e.target.checked;
    render();
  };
  $("#tierTag").onchange = (e) => {
    state.tierTag = e.target.checked;
    render();
  };
  $("#search").oninput = (e) => {
    state.search = e.target.value.trim().toLowerCase();
    render();
  };

  // A map matches if any course's filter (for current mode) passes.
  function matches(m) {
    if (state.onlyGlobal && m.state !== "approved") return false;
    if (state.search && !m.name.toLowerCase().includes(state.search))
      return false;
    for (const c of m.courses) {
      const f = c.filters && c.filters[state.mode];
      if (!f) continue;
      if (state.onlyRanked && f.state !== "ranked") continue;
      if (state.tiers.has(f[state.basis])) return true;
    }
    return false;
  }

  function selected() {
    return maps.filter(matches).sort((a, b) => a.name.localeCompare(b.name));
  }

  // Each course's tier number for the current mode/basis, in course order.
  // Single course -> "3". Multiple courses -> "3/2/5/6".
  function mapTiers(m) {
    const nums = [];
    for (const c of m.courses) {
      const f = c.filters && c.filters[state.mode];
      if (f && TIER_NUM[f[state.basis]]) nums.push(TIER_NUM[f[state.basis]]);
    }
    return nums;
  }

  function line(m) {
    if (state.tierTag) {
      const nums = mapTiers(m);
      if (nums.length) return `${m.name} (T${nums.join("/")}):${m.workshop_id}`;
    }
    return `${m.name}:${m.workshop_id}`;
  }

  function render() {
    if (!maps.length) return;
    const list = selected();
    $("#out").value = list.map(line).join("\n");
    $("#count").textContent =
      `${list.length} map${list.length === 1 ? "" : "s"}`;
    updateCounts();
  }

  // Per-tier count for current mode/basis (respecting global+ranked+search, ignoring tier selection).
  function updateCounts() {
    const base = maps.filter((m) => {
      if (state.onlyGlobal && m.state !== "approved") return false;
      if (state.search && !m.name.toLowerCase().includes(state.search))
        return false;
      return true;
    });
    for (const [t] of TIERS) {
      const n = base.filter((m) =>
        m.courses.some((c) => {
          const f = c.filters && c.filters[state.mode];
          return (
            f &&
            (!state.onlyRanked || f.state === "ranked") &&
            f[state.basis] === t
          );
        }),
      ).length;
      tiersEl.querySelector(`[data-cnt="${t}"]`).textContent = n || "";
    }
  }

  // Sort key = name part, ignoring the ":workshopid" suffix.
  function nameKey(l) {
    const i = l.lastIndexOf(":");
    return (i === -1 ? l : l.slice(0, i)).trim().toLowerCase();
  }
  $("#sort").onclick = () => {
    const lines = $("#out")
      .value.split("\n")
      .filter((l) => l.trim());
    lines.sort((a, b) => nameKey(a).localeCompare(nameKey(b)));
    $("#out").value = lines.join("\n");
  };

  $("#copy").onclick = async () => {
    await navigator.clipboard.writeText($("#out").value);
    const b = $("#copy");
    b.textContent = "Copied!";
    setTimeout(() => (b.textContent = "Copy"), 1200);
  };
  $("#download").onclick = () => {
    const blob = new Blob([$("#out").value], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `maplist_${state.mode}_${state.basis === "nub_tier" ? "tp" : "pro"}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  fetch(API)
    .then((r) => r.json())
    .then((d) => {
      maps = d.values || [];
      $("#status").textContent = `Loaded ${maps.length} maps from CS2KZ API.`;
      render();
    })
    .catch((err) => {
      $("#status").textContent = "Failed to load maps: " + err.message;
    });
</script>
